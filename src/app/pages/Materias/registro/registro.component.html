<div class="p-4">
  <div class="mb-4">
    <h2 class="text-2xl font-bold mb-2">Registro de Materias</h2>
    <p-message
      severity="info"
      [text]="
        'Puedes seleccionar máximo ' +
        maxMaterias +
        ' materias. Quedan ' +
        materiasRestantes +
        ' disponibles.'
      "
      class="mb-4"
    >
    </p-message>
  </div>

  <p-table
    [value]="materiasDisponibles"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    [responsive]="true"
    [loading]="cargando"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Seleccionar</th>
        <th>Materia</th>
        <th>Profesor</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-materia>
      <tr [class.bg-green-100]="esMateriaSeleccionada(materia.idMateria)">
        <td>
          <p-checkbox
            [ngModel]="esMateriaSeleccionada(materia.idMateria)"
            (ngModelChange)="onMateriaSeleccionada(materia, $event)"
            [disabled]="esMateriaDeshabilitada(materia)"
            [binary]="true"
          >
          </p-checkbox>
        </td>
        <td>{{ materia.nombreMateria }}</td>
        <td>{{ materia.nombreProfesor }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="3" class="text-center">No hay materias disponibles</td>
      </tr>
    </ng-template>
  </p-table>

  <div class="mt-4 flex justify-between items-center">
    <div class="text-sm text-gray-600">
      <p>
        <strong>Materias seleccionadas:</strong>
        {{ materiasSeleccionadas.length }} / {{ maxMaterias }}
      </p>
    </div>

    <p-button
      label="Registrar Materias"
      icon="pi pi-check"
      [disabled]="materiasSeleccionadas.length === 0 || cargando"
      [loading]="cargando"
      (onClick)="registrarMaterias()"
      severity="success"
    >
    </p-button>
  </div>
</div>
