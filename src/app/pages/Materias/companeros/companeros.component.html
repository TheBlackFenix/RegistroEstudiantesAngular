<div class="p-4">
  <div class="mb-4">
    <h2 class="text-2xl font-bold mb-2">Compañeros y sus Materias</h2>
    <p class="text-gray-600">
      Lista de estudiantes y las materias que están cursando
    </p>
  </div>

  <p-table
    [value]="materiasCompaneros"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="loading"
    [globalFilterFields]="['nombreEstudiante', 'nombreMateria']"
    #dt
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nombreEstudiante" class="w-1/2">
          <div class="flex items-center">
            Nombre del Estudiante
            <p-sortIcon field="nombreEstudiante" class="mx-4"></p-sortIcon>
          </div>
        </th>
        <th pSortableColumn="nombreMateria" class="w-1/2">
          <div class="flex items-center">
            Nombre de la Materia
            <p-sortIcon field="nombreMateria" class="mx-4"></p-sortIcon>
          </div>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-registro let-i="rowIndex">
      <tr [class.bg-gray-50]="i % 2 === 0">
        <td class="font-medium text-gray-900">
          {{ registro.nombreEstudiante }}
        </td>
        <td class="text-gray-700">
          {{ registro.nombreMateria }}
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2" class="text-center py-8">
          <div class="flex flex-col items-center">
            <i class="pi pi-inbox text-4xl text-gray-400 mb-2"></i>
            <p class="text-gray-500">No se encontraron registros</p>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="loadingbody">
      <tr>
        <td colspan="2" class="text-center py-8">
          <div class="flex flex-col items-center">
            <i class="pi pi-spin pi-spinner text-2xl text-blue-500 mb-2"></i>
            <p class="text-gray-500">Cargando datos...</p>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
